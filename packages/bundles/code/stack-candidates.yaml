# Stack candidate catalog — the classifier's pick-list (v2.2.6).
#
# The classifier-agent (context phase) reads this to fill the `stack` field of
# its result: it picks `language` / `package_manager` / `project_type` from the
# NAMES below (never invents) and the test/lint/build commands from
# `default_commands`. It is injected into the classifier's spawn context only
# (scoped via `spawn_context_assets`), so it stays out of every other prompt.
#
# This is a NAME + COMMAND catalog, NOT a detection registry: a task-time
# deterministic stack resolver (file-signal matching) is future work; until it
# lands the classifier is the sole consumer, so the per-entry detection signals
# (lockfiles, extensions, dependency markers) are deliberately omitted — they
# only bloated the prompt with data nothing read.

# Valid `language` values (specific frameworks first, generic last).
languages:
  - name: svelte
  - name: typescript
  - name: javascript
  - name: python
  - name: rust
  - name: go
  - name: csharp
  - name: elixir
  - name: dart

# Valid `package_manager` values, with the language(s) each serves so the
# classifier picks a compatible one (npm is the Node fall-through; pick a
# lockfile-specific PM only when the task / CLAUDE.md indicates it).
package_managers:
  - name: pnpm
    languages: [typescript, javascript]
  - name: yarn
    languages: [typescript, javascript]
  - name: bun
    languages: [typescript, javascript]
  - name: npm
    languages: [typescript, javascript]
  - name: uv
    languages: [python]
  - name: poetry
    languages: [python]
  - name: pip
    languages: [python]
  - name: cargo
    languages: [rust]
  - name: go
    languages: [go]
  - name: dotnet
    languages: [csharp]
  - name: mix
    languages: [elixir]
  - name: pub
    languages: [dart]

# Valid `project_type` values (the classifier picks one, or null when unclear).
project_types:
  - frontend-app
  - backend
  - library
  - monorepo

# Default command shapes per (language, package_manager). The classifier echoes
# these into test/lint/build; a CLAUDE.md override wins over them. `null` = the
# stack has no standard command of that kind.
default_commands:
  - language: typescript
    package_manager: pnpm
    test: "pnpm test"
    lint: "pnpm lint"
    build: "pnpm build"
  - language: typescript
    package_manager: yarn
    test: "yarn test"
    lint: "yarn lint"
    build: "yarn build"
  - language: typescript
    package_manager: bun
    test: "bun run test"
    lint: "bun run lint"
    build: "bun run build"
  - language: typescript
    package_manager: npm
    test: "npm run test"
    lint: "npm run lint"
    build: "npm run build"
  - language: javascript
    package_manager: pnpm
    test: "pnpm test"
    lint: "pnpm lint"
    build: "pnpm build"
  - language: javascript
    package_manager: yarn
    test: "yarn test"
    lint: "yarn lint"
    build: "yarn build"
  - language: javascript
    package_manager: bun
    test: "bun run test"
    lint: "bun run lint"
    build: "bun run build"
  - language: javascript
    package_manager: npm
    test: "npm run test"
    lint: "npm run lint"
    build: "npm run build"
  - language: python
    package_manager: poetry
    test: "poetry run pytest"
    lint: "poetry run ruff check"
    build: null
  - language: python
    package_manager: uv
    test: "uv run pytest"
    lint: "uv run ruff check"
    build: null
  - language: python
    package_manager: pip
    test: "pytest"
    lint: "ruff check"
    build: null
  - language: rust
    package_manager: cargo
    test: "cargo test"
    lint: "cargo clippy"
    build: "cargo build"
  - language: go
    package_manager: go
    test: "go test ./..."
    lint: "go vet ./..."
    build: "go build ./..."
  - language: csharp
    package_manager: dotnet
    test: "dotnet test"
    lint: "dotnet format --verify-no-changes"
    build: "dotnet build"
  - language: svelte
    package_manager: pnpm
    test: "pnpm test"
    lint: "pnpm lint"
    build: "pnpm build"
  - language: svelte
    package_manager: npm
    test: "npm test"
    lint: "npm run lint"
    build: "npm run build"
  - language: elixir
    package_manager: mix
    test: "mix test"
    lint: "mix credo"
    build: "mix compile"
  - language: dart
    package_manager: pub
    test: "flutter test"
    lint: "dart analyze"
    build: null
